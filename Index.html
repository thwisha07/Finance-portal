<style>
:root{--sidebar-w:260px}
*{scrollbar-width:thin;scrollbar-color:#cbd5e1 transparent}
body{font-family:'Montserrat',sans-serif;margin:0;overflow-x:hidden}
.sidebar{width:var(--sidebar-w);min-height:calc(100vh - 44px);transition:transform .3s ease}
@media(max-width:768px){.sidebar{position:fixed;z-index:40;transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;opacity:0;pointer-events:none;transition:opacity .3s}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer-panel{position:fixed;top:0;right:0;bottom:0;width:480px;max-width:100vw;background:#fff;z-index:51;transform:translateX(100%);transition:transform .3s;overflow-y:auto}
@media(max-width:540px){.drawer-panel{width:100vw}}
.drawer-panel.open{transform:translateX(0)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-box{background:#fff;border-radius:12px;max-width:640px;width:95%;max-height:90vh;overflow-y:auto;transform:scale(.95);transition:transform .25s}
.modal-overlay.open .modal-box{transform:scale(1)}
.progress-bar{height:8px;border-radius:4px;background:#e2e8f0;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .4s}
.flow-node{display:flex;flex-direction:column;align-items:center;min-width:100px}
.flow-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;position:relative}
.flow-arrow{flex:1;height:2px;background:#cbd5e1;position:relative;min-width:30px;margin-top:26px}
.flow-arrow::after{content:'';position:absolute;right:-1px;top:-4px;border:5px solid transparent;border-left-color:#cbd5e1}
.badge-count{position:absolute;top:-6px;right:-6px;min-width:20px;height:20px;border-radius:10px;background:#dc2626;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px}
.scan-badge{display:inline-flex;align-items:center;gap:3px;background:#dbeafe;color:#1d4ed8;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;margin-left:6px}
.toast{animation:slideIn .3s ease,fadeOut .3s ease 2.7s forwards}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{to{transform:translateX(100%);opacity:0}}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
table{border-collapse:collapse;width:100%}
th{text-align:left;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#64748b;padding:10px 12px;border-bottom:2px solid #e2e8f0}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9;font-size:13px;vertical-align:middle}
tr:hover td{background:#f8fafc}
.risk-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
input,select,textarea{font-family:'Montserrat',sans-serif}

// ===== AUTH =====
// REPLACE WITH THIS:
async function doLogin(){
  const email = $('loginEmail').value.trim();
  const password = $('loginPassword').value;
  if(!email || !password){
    $('loginError').textContent='Please enter email and password';
    $('loginError').classList.remove('hidden');
    return;
  }
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    if(!res.ok) throw new Error('Invalid credentials');
    const {token, user} = await res.json();
    window.__authToken = token; // store in memory only, NOT localStorage
    state.user = user;          // role/name/dept comes from server
    $('loginScreen').classList.add('hidden');
    $('app').classList.remove('hidden');
    initApp();
  } catch(e) {
    $('loginError').textContent = e.message;
    $('loginError').classList.remove('hidden');
  }
}
function doLogout(){
  sessionStorage.removeItem('springbok_user');
  state.user=null;
  $('app').classList.add('hidden');
  $('loginScreen').classList.remove('hidden');
}
function restoreSession(){
  try{const u=sessionStorage.getItem('springbok_user');if(u){state.user=JSON.parse(u);$('loginScreen').classList.add('hidden');$('app').classList.remove('hidden');initApp();return true}}catch(e){}
  return false;
}

// ===== PERMISSIONS =====
function can(action,rec){
  const r=state.user?.role,n=state.user?.name;
  if(!r)return false;
  switch(action){
    case 'create_po':return r==='po_owner';
    case 'update_completion':return r==='po_owner'&&(!rec||rec.owner===n);
    case 'mark_complete':return r==='po_owner'&&(!rec||rec.owner===n);
    case 'see_gr_controls':return r==='finance'||r==='senior_finance';
    case 'post_gr':return(r==='finance'||r==='senior_finance')&&(!rec||rec.owner!==n);
    case 'see_invoice_amounts':return r==='finance'||r==='senior_finance';
    case 'see_invoice_controls':return r==='finance'||r==='senior_finance';
    case 'record_invoice':return(r==='finance'||r==='senior_finance')&&(!rec||rec.owner!==n);
    case 'approve_invoice':
      if(r!=='finance'&&r!=='senior_finance')return false;
      if(!rec)return true;
      if(rec.value>50000)return r==='senior_finance';
      return rec.owner!==n;
    case 'mark_paid':return(r==='finance'||r==='senior_finance')&&(!rec||rec.owner!==n);
    case 'flag_vendor':return r==='finance'||r==='senior_finance';
    case 'send_alert':return r==='finance'||r==='senior_finance';
    case 'see_reconciliation':return r==='finance'||r==='senior_finance';
    case 'see_vendors':return r==='finance'||r==='senior_finance';
    case 'see_invoice_control':return r==='finance'||r==='senior_finance';
    case 'see_gr_queue':return r==='finance'||r==='senior_finance';
    case 'see_forecast':return r==='finance'||r==='senior_finance';
    case 'see_settings':return r==='finance'||r==='senior_finance';
    case 'export_csv':return r==='finance'||r==='senior_finance';
    case 'see_value':return r!=='receiver';
    case 'see_quantity':return r!=='receiver';
    case 'enter_delivery_qty':return r==='receiver';
    default:return true;
  }
}

  if(state.user.role==='receiver'){state.view='deliveries';}

function setupSidebar(){

function navigate(view){

// ===== FILTERED RECORDS =====
function getRecords(){
  let recs=[...state.records];
  const r=state.user.role;
  // PO Owner sees only their department
  if(r==='po_owner')recs=recs.filter(x=>x.department===state.user.dept);
  // Receiver: strip value and quantity data before returning
  if(r==='receiver'){
    recs=recs.filter(x=>x.orderedQty!=null&&x.deliveryQtyReceived==null);
    return recs.map(x=>({...x,value:undefined,invoiceAmount:undefined,orderedQty:undefined}));
  }
  // Apply search
  if(state.filters.search){
    const s=state.filters.search.toLowerCase();
    recs=recs.filter(x=>x.poNumber.toLowerCase().includes(s)||x.vendor.toLowerCase().includes(s)||x.description.toLowerCase().includes(s)||x.owner.toLowerCase().includes(s));
  }
  // Apply department filter
  if(state.filters.dept)recs=recs.filter(x=>x.department===state.filters.dept);
  // Apply period filter
  if(state.filters.period)recs=recs.filter(x=>x.reportingPeriod===state.filters.period);
  return recs;
}
function fmtCur(v){if(v==null)return'—';return'R '+Number(v).toLocaleString('en-ZA',{minimumFractionDigits:0,maximumFractionDigits:0})}

// ===== RENDER =====
function render(){
  const v=state.view;
  const renderers={dashboard:renderDashboard,commitments:renderCommitments,grqueue:renderGrQueue,invoicecontrol:renderInvoiceControl,forecast:renderForecast,vendors:renderVendors,reconciliation:renderReconciliation,deliveries:renderDeliveries,settings:renderSettings};
  (renderers[v]||renderDashboard)();
}

// ===== DASHBOARD =====
function renderDashboard(){
  const r=state.user.role;
  let recs=[...state.records];
  if(r==='po_owner')recs=recs.filter(x=>x.department===state.user.dept);
  const totalCommitted=recs.reduce((s,x)=>s+x.value,0);
  const workCompleted=recs.filter(x=>x.serviceStatus==='Completed').reduce((s,x)=>s+x.value,0);
  const missingInvoices=recs.filter(x=>x.serviceStatus==='Completed'&&x.invoiceStatus==='Required').length;
  const highRisk=recs.filter(x=>x.escalated||x.vendorFlagged).length;
  // Pending alerts (Finance/Senior only)
  const alertRecs=can('send_alert')?getAlertDueRecords(recs):[];
  // High-value approvals (Senior Finance only)
  const hvApprovals=r==='senior_finance'?recs.filter(x=>x.invoiceStatus==='Received'&&x.value>50000):[];
  // Priority exceptions
  const exceptions=[];
  recs.filter(x=>x.serviceStatus==='Completed'&&x.grStatus==='Pending').forEach(x=>exceptions.push({rec:x,priority:'high',label:'GR required',icon:'fa-clipboard-check',color:'text-sb-orange'}));
  recs.filter(x=>x.serviceStatus==='Completed'&&x.grStatus==='Posted'&&x.invoiceStatus==='Required'&&!x.escalated).forEach(x=>exceptions.push({rec:x,priority:'high',label:'Invoice missing',icon:'fa-file-invoice-dollar',color:'text-sb-red'}));
  recs.filter(x=>x.escalated).forEach(x=>exceptions.push({rec:x,priority:'critical',label:'Escalated — vendor follow-up exhausted',icon:'fa-exclamation-triangle',color:'text-sb-red'}));
  if(r==='senior_finance')recs.filter(x=>x.invoiceStatus==='Received'&&x.value>50000).forEach(x=>exceptions.push({rec:x,priority:'high',label:'High-value invoice needs approval',icon:'fa-coins',color:'text-sb-yellow'}));
  // Process flow counts
  const flowCounts=[
    recs.length,
    recs.filter(x=>x.serviceStatus==='Completed').length,
    recs.filter(x=>x.grStatus==='Posted').length,
    recs.filter(x=>['Received','Approved','Paid'].includes(x.invoiceStatus)).length,
    recs.filter(x=>['Approved','Paid'].includes(x.invoiceStatus)).length,
    recs.filter(x=>x.invoiceStatus==='Paid'&&x.erpGrMatched&&x.erpInvoiceMatched).length
  ];

  let html=`<h2 class="text-xl font-800 text-sb-dark mb-1">Control Dashboard</h2>
  <p class="text-sm text-gray-500 mb-6">Real-time overview of purchase commitments and control status</p>
  <!-- KPI Cards -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
    ${kpiCard('Total Committed',fmtCur(totalCommitted),'fa-file-invoice','bg-sb-blue/10 text-sb-blue')}
    ${kpiCard('Work Completed',fmtCur(workCompleted),'fa-check-circle','bg-sb-green/10 text-sb-green')}
    ${kpiCard('Missing Invoices',missingInvoices,'fa-file-invoice-dollar','bg-sb-red/10 text-sb-red')}
    ${kpiCard('High Risk',highRisk,'fa-exclamation-triangle','bg-sb-orange/10 text-sb-orange')}
  </div>`;
  // Pending vendor alerts
  if(can('send_alert')&&alertRecs.length){
    html+=`<div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-700 text-amber-900 text-sm"><i class="fas fa-bell mr-2"></i>Pending Vendor Alerts (${alertRecs.length})</h3>
        <button onclick="sendAllAlerts()" class="text-xs bg-amber-600 text-white px-3 py-1.5 rounded-lg hover:bg-amber-700 transition font-600">Send all due alerts</button>
      </div>
      <div class="space-y-2">${alertRecs.map(x=>`<div class="flex items-center justify-between bg-white rounded-lg px-3 py-2">
        <div class="text-sm"><span class="font-600">${x.poNumber}</span> — ${x.vendor} <span class="text-gray-400 text-xs">(${daysBetween(x.grDate,todayStr())} days since GR)</span></div>
        <button onclick="openAlertModal(${x.id})" class="text-xs bg-amber-500 text-white px-3 py-1 rounded hover:bg-amber-600 transition font-600">Send alert</button>
      </div>`).join('')}</div>
    </div>`;
  }
  // High-value approvals
  if(r==='senior_finance'&&hvApprovals.length){
    html+=`<div class="bg-purple-50 border border-purple-200 rounded-xl p-4 mb-6">
      <h3 class="font-700 text-purple-900 text-sm mb-3"><i class="fas fa-coins mr-2"></i>High-Value Approvals (${hvApprovals.length})</h3>
      <div class="space-y-2">${hvApprovals.map(x=>`<div class="flex items-center justify-between bg-white rounded-lg px-3 py-2 cursor-pointer hover:bg-purple-50 transition" onclick="openDrawer(${x.id})">
        <div class="text-sm"><span class="font-600">${x.poNumber}</span> — ${x.vendor} — <span class="font-700 text-purple-700">${fmtCur(x.value)}</span></div>
        <i class="fas fa-chevron-right text-purple-400 text-xs"></i>
      </div>`).join('')}</div>
    </div>`;
  }
  // Priority Exceptions
  html+=`<div class="bg-white rounded-xl border border-gray-200 p-4 mb-6">
    <h3 class="font-700 text-sb-dark text-sm mb-3"><i class="fas fa-exclamation-circle mr-2 text-sb-orange"></i>Priority Exceptions (${exceptions.length})</h3>`;
  if(exceptions.length){
    html+=`<div class="space-y-2">${exceptions.slice(0,8).map(e=>`<div class="flex items-center justify-between py-2 px-3 rounded-lg hover:bg-gray-50 cursor-pointer transition" onclick="openDrawer(${e.rec.id})">
      <div class="flex items-center gap-3"><i class="fas ${e.icon} ${e.color}"></i><div class="text-sm"><span class="font-600">${e.rec.poNumber}</span> — ${e.rec.vendor}</div></div>
      <span class="text-xs font-600 px-2 py-0.5 rounded-full ${e.priority==='critical'?'bg-red-100 text-red-700':'bg-amber-100 text-amber-700'}">${e.label}</span>
    </div>`).join('')}</div>`;
  }else{html+=`<p class="text-sm text-gray-400">No exceptions — everything is on track.</p>`}
  html+=`</div>`;
  // Process Flow Diagram
  html+=`<div class="bg-white rounded-xl border border-gray-200 p-6">
    <h3 class="font-700 text-sb-dark text-sm mb-6"><i class="fas fa-diagram-project mr-2 text-sb-blue"></i>Control Flow</h3>
    <div class="flex items-start overflow-x-auto pb-2">`;
  const flowColors=['#0056a3','#2563eb','#37b34a','#ca8a04','#ea580c','#7c3aed'];
  STAGES.forEach((s,i)=>{
    html+=`<div class="flow-node">
      <div class="flow-circle" style="background:${flowColors[i]}">${flowCounts[i]}</div>
      <div class="text-xs font-600 text-gray-700 mt-2 text-center max-w-[100px]">${s}</div>
    </div>`;
    if(i<STAGES.length-1)html+=`<div class="flow-arrow"></div>`;
  });
  html+=`</div></div>`;
  $('mainContent').innerHTML=html;
}
function kpiCard(label,value,icon,colorClass){
  return`<div class="bg-white rounded-xl border border-gray-200 p-4">
    <div class="flex items-center justify-between mb-2">
      <span class="text-xs font-600 text-gray-500 uppercase tracking-wider">${label}</span>
      <div class="w-9 h-9 rounded-lg ${colorClass} flex items-center justify-center"><i class="fas ${icon} text-sm"></i></div>
    </div>

// ===== INVOICE CONTROL =====
function renderInvoiceControl(){
  let recs=state.records.filter(x=>x.serviceStatus==='Completed');
  const f=state.filters.invoiceFilter||'all';
  if(f==='required')recs=recs.filter(x=>x.invoiceStatus==='Required');
  else if(f==='received')recs=recs.filter(x=>x.invoiceStatus==='Received');
  else if(f==='approved')recs=recs.filter(x=>x.invoiceStatus==='Approved');
  else if(f==='flagged')recs=recs.filter(x=>x.vendorFlagged||x.escalated);
  const missingCount=state.records.filter(x=>x.serviceStatus==='Completed'&&x.invoiceStatus==='Required').length;
  let html=`<div class="mb-4"><h2 class="text-xl font-800 text-sb-dark">Invoice Control</h2><p class="text-sm text-gray-500">Track and control supplier invoices</p></div>
  <div class="flex flex-wrap gap-2 mb-4">
    ${['all','required','received','approved','flagged'].map(v=>`<button onclick="state.filters.invoiceFilter='${v}';renderInvoiceControl()" class="px-3 py-1.5 rounded-lg text-xs font-600 transition ${f===v?'bg-sb-blue text-white':'bg-white border border-gray-300 text-gray-600 hover:bg-gray-50'}">${v==='all'?'All':v.charAt(0).toUpperCase()+v.slice(1)}${v==='required'&&missingCount?` (${missingCount})`:''}</button>`).join('')}
  </div>
  <div class="bg-white rounded-xl border border-gray-200 overflow-x-auto">
  <table><thead><tr><th>PO Number</th><th>Vendor</th><th>Description</th><th>Invoice Status</th><th>Invoice #</th><th>Amount</th><th>Follow-ups</th><th>Actions</th></tr></thead><tbody>`;
  if(!recs.length)html+=`<tr><td colspan="8" class="text-center text-gray-400 py-8">No records match this filter</td></tr>`;
  recs.forEach(r=>{
    const isMissing=r.invoiceStatus==='Required';
    const rowClass=isMissing?'bg-red-50':'';
    const statusColors={Required:'bg-red-100 text-red-700',Received:'bg-amber-100 text-amber-700',Approved:'bg-blue-100 text-blue-700',Paid:'bg-green-100 text-green-700'};
    let actions='';
    if(can('record_invoice',r)&&isMissing)actions+=`<button onclick="openInvoiceModal(${r.id})" class="bg-sb-blue text-white px-2.5 py-1 rounded text-xs font-600 hover:bg-sb-blue/90 transition mr-1">Record Invoice</button>`;
    if(can('approve_invoice',r)&&r.invoiceStatus==='Received')actions+=`<button onclick="doApproveInvoice(${r.id})" class="bg-sb-green text-white px-2.5 py-1 rounded text-xs font-600 hover:bg-sb-green/90 transition mr-1">Approve</button>`;
    if(can('mark_paid',r)&&r.invoiceStatus==='Approved')actions+=`<button onclick="doMarkPaid(${r.id})" class="bg-gray-800 text-white px-2.5 py-1 rounded text-xs font-600 hover:bg-gray-700 transition mr-1">Mark Paid</button>`;
    if(can('flag_vendor',r)&&isMissing)actions+=`<button onclick="doFlagVendor(${r.id})" class="bg-sb-orange text-white px-2.5 py-1 rounded text-xs font-600 hover:bg-sb-orange/90 transition">Flag</button>`;
    html+=`<tr class="${rowClass} cursor-pointer" onclick="openDrawer(${r.id})">
      <td class="font-600 text-sb-blue">${r.poNumber}</td>
      <td>${r.vendor}</td><td class="max-w-[180px] truncate">${r.description}</td>
      <td><span class="text-xs font-600 px-2 py-0.5 rounded-full ${statusColors[r.invoiceStatus]||''}">${r.invoiceStatus}${r.escalated?' — Escalated':''}</span></td>

// ===== EXPENSE FORECAST =====
function renderForecast(){
  const months=['2026-07','2026-08','2026-09','2026-10'];
  const monthLabels=['Jul 2026','Aug 2026','Sep 2026','Oct 2026'];
  const stages=['Committed','Work Done','Invoiced','Paid'];
  let html=`<div class="mb-4"><h2 class="text-xl font-800 text-sb-dark">Expense Forecast</h2><p class="text-sm text-gray-500">Predicted cash outflows by month and department</p></div>
  <div class="bg-white rounded-xl border border-gray-200 overflow-x-auto">
  <table><thead><tr><th>Department / Stage</th>${monthLabels.map(m=>`<th class="text-right">${m}</th>`).join('')}<th class="text-right">Total</th></tr></thead><tbody>`;
  let grandTotal={};
  months.forEach(m=>grandTotal[m]=0);
  DEPARTMENTS.forEach(dept=>{
    html+=`<tr class="bg-gray-50"><td colspan="6" class="font-700 text-sm text-sb-dark">${dept}</td></tr>`;
    stages.forEach(stage=>{
      html+=`<tr><td class="pl-6 text-xs text-gray-600">${stage}</td>`;
      let rowTotal=0;
      months.forEach(m=>{
        let val=0;
        const recs=state.records.filter(x=>x.department===dept&&x.reportingPeriod===m);
        if(stage==='Committed')val=recs.reduce((s,x)=>s+x.value,0);
        else if(stage==='Work Done')val=recs.filter(x=>x.serviceStatus==='Completed').reduce((s,x)=>s+x.value,0);
        else if(stage==='Invoiced')val=recs.filter(x=>['Received','Approved','Paid'].includes(x.invoiceStatus)).reduce((s,x)=>s+x.value,0);
        else if(stage==='Paid')val=recs.filter(x=>x.invoiceStatus==='Paid').reduce((s,x)=>s+x.value,0);
        rowTotal+=val;grandTotal[m]+=val;
        html+=`<td class="text-right text-sm font-600">${val?fmtCur(val):'—'}</td>`;
      });
      html+=`<td class="text-right text-sm font-700">${rowTotal?fmtCur(rowTotal):'—'}</td></tr>`;
    });
  });
  html+=`<tr class="bg-sb-blue/5 font-800"><td>Grand Total</td>`;
  let gt=0;months.forEach(m=>{gt+=grandTotal[m];html+=`<td class="text-right text-sm">${grandTotal[m]?fmtCur(grandTotal[m]):'—'}</td>`});
  html+=`<td class="text-right text-sm">${gt?fmtCur(gt):'—'}</td></tr>`;
  html+=`</tbody></table></div>`;
  $('mainContent').innerHTML=html;
}

// ===== VENDORS =====
function renderVendors(){

        <div><div class="text-lg font-800 text-sb-blue">${v.open}</div><div class="text-xs text-gray-500">Open</div></div>

// ===== ERP RECONCILIATION =====
function renderReconciliation(){
  const recs=state.records.filter(x=>x.grStatus==='Posted'||['Received','Approved','Paid'].includes(x.invoiceStatus));
  let html=`<div class="mb-4"><h2 class="text-xl font-800 text-sb-dark">ERP Reconciliation</h2><p class="text-sm text-gray-500">Comparing portal records against the accounting system</p></div>
  <div class="bg-white rounded-xl border border-gray-200 overflow-x-auto">
  <table><thead><tr><th>PO Number</th><th>Vendor</th><th>GR Reference</th><th>GR Match</th><th>Invoice Reference</th><th>Inv. Match</th><th>Status</th></tr></thead><tbody>`;
  if(!recs.length)html+=`<tr><td colspan="7" class="text-center text-gray-400 py-8">No records to reconcile</td></tr>`;
  recs.forEach(r=>{
    const grOk=r.erpGrMatched;
    const invOk=r.erpInvoiceMatched;
    const bothOk=grOk&&invOk;
    const hasGr=r.grRef!=null;
    const hasInv=r.erpInvoiceRef!=null;
    let status,statusClass;
    if(bothOk){status='Matched';statusClass='bg-green-100 text-green-700'}
    else if(!hasGr&&!hasInv){status='Pending';statusClass='bg-gray-100 text-gray-600'}
    else{status='Action Required';statusClass='bg-red-100 text-red-700'}
    html+=`<tr class="cursor-pointer" onclick="openDrawer(${r.id})">
      <td class="font-600 text-sb-blue">${r.poNumber}</td>
      <td>${r.vendor}</td>
      <td class="text-xs font-mono">${r.grRef||'—'}</td>
      <td>${hasGr?`<span class="text-xs font-600 ${grOk?'text-sb-green':'text-sb-red'}"><i class="fas ${grOk?'fa-check-circle':'fa-times-circle'} mr-1"></i>${grOk?'Matched':'Mismatch'}</span>`:'<span class="text-xs text-gray-400">N/A</span>'}</td>
      <td class="text-xs font-mono">${r.erpInvoiceRef||'—'}</td>
      <td>${hasInv?`<span class="text-xs font-600 ${invOk?'text-sb-green':'text-sb-red'}"><i class="fas ${invOk?'fa-check-circle':'fa-times-circle'} mr-1"></i>${invOk?'Matched':'Mismatch'}</span>`:'<span class="text-xs text-gray-400">N/A</span>'}</td>
      <td><span class="text-xs font-600 px-2 py-0.5 rounded-full ${statusClass}">${status}</span></td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  $('mainContent').innerHTML=html;
}

// ===== ACTIONS =====
function doUpdateCompletion(id){
  const val=parseInt($('drawerCompletion').value);
  const r=state.records.find(x=>x.id===id);
  if(!r||val<0||val>99)return;
  r.completion=val;
  r.timeline.push({date:todayStr(),action:`Completion updated to ${val}%`,by:state.user.name});
  saveData();openDrawer(id);setupSidebar();showToast('Completion updated','success');
}
function doMarkComplete(id){
  const r=state.records.find(x=>x.id===id);
  if(!r)return;
  r.serviceStatus='Completed';r.completion=100;
  r.timeline.push({date:todayStr(),action:'Service marked complete',by:state.user.name});
  saveData();openDrawer(id);setupSidebar();showToast('Service marked as completed','success');
}
function doRecordGR(id){
  const ref=$('grRefInput').value.trim();
  if(!ref){showToast('Please enter a GR reference','error');return}
  const r=state.records.find(x=>x.id===id);
  if(!r)return;
  r.grStatus='Posted';r.grRef=ref;r.grDate=todayStr();r.erpGrMatched=true;
  r.timeline.push({date:todayStr(),action:`GR posted — ${ref}`,by:state.user.name});
  saveData();closeModal();if(state.drawerRecordId===id)openDrawer(id);setupSidebar();render();showToast('GR recorded successfully','success');
  // In a real system, this is where an ERP webhook call would be made to verify the GR reference
}
function doRecordInvoice(id){
  const num=$('invNumInput').value.trim();
  const amt=parseFloat($('invAmtInput').value);
  if(!num){showToast('Please enter an invoice number','error');return}
  if(isNaN(amt)||amt<=0){showToast('Please enter a valid amount','error');return}
  const r=state.records.find(x=>x.id===id);
  if(!r)return;
  r.invoiceStatus='Received';r.invoiceNumber=num;r.invoiceAmount=amt;r.invoiceDate=todayStr();
  r.timeline.push({date:todayStr(),action:`Invoice received — ${num} (${fmtCur(amt)})`,by:state.user.name});
  saveData();closeModal();if(state.drawerRecordId===id)openDrawer(id);setupSidebar();render();showToast('Invoice recorded','success');
}
function doApproveInvoice(id){
  const r=state.records.find(x=>x.id===id);
  if(!r)return;
  if(r.value>50000&&state.user.role!=='senior_finance'){showToast('High-value invoice requires Senior Finance approval','error');return}
  const erpRef='ERP-INV-2026-'+String(Math.floor(Math.random()*9000)+1000);
  r.invoiceStatus='Approved';r.erpInvoiceRef=erpRef;
  r.timeline.push({date:todayStr(),action:`Invoice approved — ${erpRef}`,by:state.user.name});
  saveData();if(state.drawerRecordId===id)openDrawer(id);setupSidebar();render();showToast('Invoice approved','success');
}
function doMarkPaid(id){
  const r=state.records.find(x=>x.id===id);
  if(!r)return;
  r.invoiceStatus='Paid';r.paidDate=todayStr();
  r.timeline.push({date:todayStr(),action:'Marked as paid',by:state.user.name});
  saveData();if(state.drawerRecordId===id)openDrawer(id);setupSidebar();render();showToast('Record marked as paid','success');
}
function doFlagVendor(id){
  const r=state.records.find(x=>x.id===id);
  if(!r)return;
  r.vendorFlagged=true;r.lastFollowUp=todayStr();r.followUpCount++;
  if(state.vendors[r.vendor])state.vendors[r.vendor].flagged=true;
  r.timeline.push({date:todayStr(),action:'Vendor flagged for follow-up',by:state.user.name});
  saveData();if(state.drawerRecordId===id)openDrawer(id);render();showToast('Vendor flagged for follow-up','success');
}
function doMarkAlertSent(id){
  const r=state.records.find(x=>x.id===id);
  if(!r)return;
  r.followUpCount++;r.lastFollowUp=todayStr();r.vendorFlagged=true;
  if(state.vendors[r.vendor])state.vendors[r.vendor].flagged=true;
  if(r.followUpCount>=state.settings.alertMaxFollowups){
    r.escalated=true;
    r.timeline.push({date:todayStr(),action:`Vendor alert #${r.followUpCount} sent — escalated to management`,by:state.user.name});
  }else{
    r.timeline.push({date:todayStr(),action:`Vendor alert #${r.followUpCount} sent`,by:state.user.name});
  }
  saveData();closeModal();render();showToast('Alert marked as sent','success');
}
function sendAllAlerts(){
  const recs=getAlertDueRecords(state.records);
  if(!recs.length){showToast('No alerts due','info');return}
  recs.forEach(r=>{
    r.followUpCount++;r.lastFollowUp=todayStr();r.vendorFlagged=true;
    if(state.vendors[r.vendor])state.vendors[r.vendor].flagged=true;
    if(r.followUpCount>=state.settings.alertMaxFollowups){
      r.escalated=true;
      r.timeline.push({date:todayStr(),action:`Vendor alert #${r.followUpCount} sent — escalated`,by:state.user.name});
    }else{
      r.timeline.push({date:todayStr(),action:`Vendor alert #${r.followUpCount} sent`,by:state.user.name});
    }
  });
  saveData();render();showToast(`${recs.length} alert(s) marked as sent`,'success');
}
function doCreatePO(){
  const vendor=$('poVendor').value.trim();
  const dept=$('poDept').value;
  const desc=$('poDesc').value.trim();
  const value=parseFloat($('poValue').value);
  const expDate=$('poDate').value;
  const quoteRef=$('poQuoteRef').value.trim();
  const qty=$('poQty').value?parseInt($('poQty').value):null;
  if(!vendor){showToast('Vendor name is required','error');return}
  if(!desc){showToast('Description is required','error');return}
  if(isNaN(value)||value<=0){showToast('PO value is required','error');return}
  if(!dept){showToast('Department is required','error');return}
  const maxNum=state.records.reduce((m,x)=>{const n=parseInt(x.poNumber.split('-').pop());return n>m?n:m},0);
  const newRec={
    id:Date.now(),poNumber:`PO-2026-${String(maxNum+1).padStart(3,'0')}`,vendor,description:desc,department:dept,value,owner:state.user.name,
    serviceStatus:'In Progress',completion:0,grStatus:'Pending',grRef:null,grDate:null,
    invoiceStatus:'Required',invoiceNumber:null,invoiceAmount:null,invoiceDate:null,erpInvoiceRef:null,
    followUpCount:0,lastFollowUp:null,vendorFlagged:false,escalated:false,paidDate:null,
    expectedDate:expDate||null,quoteRef:quoteRef||null,lineItems:[],orderedQty:qty,deliveryQtyReceived:null,
    erpGrMatched:false,erpInvoiceMatched:false,createdDate:todayStr(),
    reportingPeriod:expDate?expDate.substring(0,7):'2026-08',
    timeline:[{date:todayStr(),action:'PO created',by:state.user.name}]
  };
  if(!state.vendors[vendor])state.vendors[vendor]={email:'',flagged:false};
  state.records.unshift(newRec);
  saveData();closeModal();render();showToast('PO created successfully','success');
}
function doEnterDeliveryQty(id){
  const qty=parseInt($('deliveryQty').value);
  if(isNaN(qty)||qty<0){showToast('Please enter a valid quantity','error');return}
  const r=state.records.find(x=>x.id===id);
  if(!r)return;
  r.deliveryQtyReceived=qty;
  r.timeline.push({date:todayStr(),action:`Delivery quantity recorded: ${qty}`,by:state.user.name});
  saveData();closeModal();render();showToast('Delivery quantity recorded','success');

function doSaveVendorEmail(name){
  const email=$('vendorEmailInput').value.trim();
  if(!state.vendors[name])state.vendors[name]={email:'',flagged:false};
  state.vendors[name].email=email;
  saveData();closeModal();render();showToast('Vendor email updated','success');
}

// ===== ALERT LOGIC =====
function getAlertDueRecords(recs){
  const s=state.settings;
  return recs.filter(r=>{
    if(r.grStatus!=='Posted'||r.invoiceStatus!=='Required'||r.escalated)return false;
    const daysSinceGR=daysBetween(r.grDate,todayStr());
    if(r.followUpCount===0)return daysSinceGR>=s.alertDaysFirst;
    const daysSinceFollow=daysBetween(r.lastFollowUp,todayStr());
    return daysSinceFollow>=s.alertDaysBetween&&r.followUpCount<s.alertMaxFollowups;
  });
}

// ===== QUOTE SCANNING =====
function triggerScan(){$('scanFileInput').click()}
function handleScanFile(input){
  const file=input.files[0];
  if(!file)return;
  if(file.size>4*1024*1024){showToast('File is too large (max 4MB)','error');input.value='';return}
  const apiKey=localStorage.getItem('springbok_api_key');
  if(!apiKey){showToast('Please set your Claude API key in Settings first','error');input.value='';return}
  $('scanStatus').classList.remove('hidden');
  $('scanBtn').disabled=true;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    const base64=e.target.result.split(',')[1];
    const mediaType=file.type||'application/pdf';
    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'x-api-key':apiKey,'anthropic-version':'2023-06-01','content-type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-6',max_tokens:1024,
          system:'You are a data extraction assistant. Extract information from this quote/document and return ONLY a valid JSON object with these keys: "vendor" (string, company name), "description" (string, description of services/goods), "value" (number, total value), "expectedDate" (string, date in YYYY-MM-DD format if found, otherwise null), "quoteRef" (string, quote/reference number if found, otherwise null), "lineItems" (array of objects with "description" and "value" keys if line items found, otherwise empty array). Return only the JSON, no other text.',
          messages:[{role:'user',content:[{type:mediaType.startsWith('image/')?'image':'document',source:{type:'base64',media_type:mediaType,data:base64}}]}]
        })
      });
      if(!resp.ok)throw new Error(`API error: ${resp.status} ${resp.statusText}`);
      const data=await resp.json();
      const text=data.content[0].text;
      let parsed;
      try{parsed=JSON.parse(text)}catch{
        const m=text.match(/```(?:json)?\s*([\s\S]*?)```/);
        if(m)parsed=JSON.parse(m[1]);else throw new Error('Invalid JSON from API');
      }
      populateFormFromScan(parsed);
    }catch(err){
      showToast('Scan failed: '+err.message,'error');
    }finally{
      $('scanStatus').classList.add('hidden');
      $('scanBtn').disabled=false;
      input.value='';
    }
  };
  reader.readAsDataURL(file);
}
function populateFormFromScan(data){
  const warnings=[];
  const fields=[
    {key:'vendor',el:'poVendor',badge:'badgeVendor'},
    {key:'description',el:'poDesc',badge:'badgeDesc'},
    {key:'value',el:'poValue',badge:'badgeValue'},
    {key:'expectedDate',el:'poDate',badge:'badgeDate'},
    {key:'quoteRef',el:'poQuoteRef',badge:'badgeRef'}
  ];
  fields.forEach(f=>{
    const val=data[f.key];
    if(val!=null&&val!==''&&val!==0){
      $(f.el).value=val;
      $(f.badge).classList.remove('hidden');
    }else{
      if(f.key!=='quoteRef'&&f.key!=='expectedDate')warnings.push(f.key);
    }
  });
  if(warnings.length){
    $('scanWarnings').innerHTML=warnings.map(w=>`<div class="bg-amber-50 border border-amber-200 rounded-lg p-2 text-xs text-amber-800 mb-1"><i class="fas fa-exclamation-circle mr-1"></i>Could not extract ${w} — please fill manually</div>`).join('');
  }
  showToast('Quote scanned — please review the extracted data','success');
}

// ===== CSV EXPORT =====
function exportCSV(view){
  let recs=getRecords();
  if(view==='commitments'){
    // Already filtered
  }else if(view==='grqueue'){
    recs=state.records.filter(x=>x.serviceStatus==='Completed'&&x.grStatus==='Pending');
  }else if(view==='invoicecontrol'){
    recs=state.records.filter(x=>x.serviceStatus==='Completed');
  }
  const headers=['PO Number','Vendor','Description','Department','Value','Owner','Service Status','Completion','GR Status','GR Ref','GR Date','Invoice Status','Invoice #','Invoice Amount','ERP Inv Ref','Follow-ups','Escalated','Paid Date','Expected Date','Quote Ref','Reporting Period'];
  const rows=recs.map(r=>[r.poNumber,r.vendor,r.description,r.department,r.value,r.owner,r.serviceStatus,r.completion,r.grStatus,r.grRef,r.grDate,r.invoiceStatus,r.invoiceNumber,r.invoiceAmount,r.erpInvoiceRef,r.followUpCount,r.escalated,r.paidDate,r.expectedDate,r.quoteRef,r.reportingPeriod]);
  let csv=headers.join(',')+'\n';
  rows.forEach(row=>{csv+=row.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')+'\n'});
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`springbok_export_${todayStr()}.csv`;a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exported','success');
}

// ===== TOAST =====
function showToast(msg,type='info'){
  const colors={success:'bg-sb-green text-white',error:'bg-sb-red text-white',info:'bg-sb-blue text-white'};
  const icons={success:'fa-check-circle',error:'fa-exclamation-circle',info:'fa-info-circle'};
  const el=document.createElement('div');
  el.className=`toast ${colors[type]||colors.info} px-4 py-3 rounded-lg shadow-lg text-sm font-600 flex items-center gap-2`;
  el.innerHTML=`<i class="fas ${icons[type]||icons.info}"></i>${msg}`;
  $('toastContainer').appendChild(el);
  setTimeout(()=>el.remove(),3000);
}
