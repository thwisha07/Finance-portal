<script>
/**
 * SPRINGBOK FINANCE PORTAL - PRODUCTION-READY REFACTOR
 * 
 * SECURITY IMPROVEMENTS:
 * - JWT-based authentication (backend required)
 * - Server-side authorization checks
 * - XSS prevention (textContent instead of innerHTML)
 * - Input validation framework
 * - CSRF token handling
 * - Session timeout management
 * - Secure credential handling
 * - Audit logging structure
 * 
 * ARCHITECTURE:
 * - Modular service layer
 * - Type safety with JSDoc
 * - Error boundaries
 * - State management
 * - API abstraction layer
 */

// ===================== TYPES & CONSTANTS =====================
const ROLES = {
  PO_OWNER: 'po_owner',
  RECEIVER: 'receiver',
  FINANCE: 'finance',
  SENIOR_FINANCE: 'senior_finance'
};

const DEPARTMENTS = ['Maintenance', 'Production', 'IT', 'Facilities', 'Logistics'];
const STAGES = ['PO Created', 'Work Delivered', 'GR Posted', 'Invoice Controlled', 'Payment Scheduled', 'Reconciled'];
const ROLE_LABELS = {
  po_owner: 'PO Owner',
  receiver: 'Receiver / Stores',
  finance: 'Finance',
  senior_finance: 'Senior Finance / CFO'
};

const INVOICE_STATUSES = ['Required', 'Received', 'Approved', 'Paid'];
const SERVICE_STATUSES = ['In Progress', 'Completed'];
const GR_STATUSES = ['Pending', 'Posted'];

// ===================== VALIDATION FRAMEWORK =====================
/** @type {Object} Validation rules for all user inputs */
const Validators = {
  /**
   * Validate invoice number format
   * @param {string} value - Invoice number to validate
   * @returns {{valid: boolean, error?: string}}
   */
  invoiceNumber: (value) => {
    if (!value) return { valid: false, error: 'Invoice number required' };
    if (!/^[A-Z0-9]{5,20}$/.test(value.trim())) {
      return { valid: false, error: 'Invoice must be 5-20 alphanumeric characters (uppercase)' };
    }
    if (/^(TEST|DEMO|SAMPLE|FAKE)/.test(value)) {
      return { valid: false, error: 'Invalid invoice number (contains reserved word)' };
    }
    return { valid: true };
  },

  /**
   * Validate invoice amount with business rules
   * @param {number} value - Amount to validate
   * @param {number} poValue - PO amount for comparison
   * @returns {{valid: boolean, error?: string}}
   */
  invoiceAmount: (value, poValue) => {
    if (value === null || value === undefined) {
      return { valid: false, error: 'Amount required' };
    }
    if (typeof value !== 'number' || value <= 0) {
      return { valid: false, error: 'Amount must be greater than 0' };
    }
    if (!/^\d+(\.\d{0,2})?$/.test(value.toString())) {
      return { valid: false, error: 'Amount must have maximum 2 decimal places (ZAR)' };
    }
    if (value > 5000000) {
      return { valid: false, error: 'Single invoice cannot exceed R5,000,000' };
    }
    if (poValue && value > poValue * 1.15) {
      return { valid: false, error: `Amount exceeds PO value (R${poValue}) by more than 15%` };
    }
    return { valid: true };
  },

  /**
   * Validate vendor email
   * @param {string} value - Email to validate
   * @returns {{valid: boolean, error?: string}}
   */
  vendorEmail: (value) => {
    if (!value) return { valid: true }; // Optional field
    const emailRegex = /^[^\s@]{1,64}@[^\s@]{1,255}\.[^\s@]{2,}$/;
    if (!emailRegex.test(value)) {
      return { valid: false, error: 'Invalid email address format' };
    }
    return { valid: true };
  },

  /**
   * Validate PO number format
   * @param {string} value - PO number to validate
   * @returns {{valid: boolean, error?: string}}
   */
  poNumber: (value) => {
    if (!value) return { valid: false, error: 'PO number required' };
    if (!/^PO-\d{4}-\d{3}$/.test(value)) {
      return { valid: false, error: 'PO format must be PO-YYYY-### (e.g., PO-2026-001)' };
    }
    return { valid: true };
  },

  /**
   * Validate GR reference format
   * @param {string} value - GR reference to validate
   * @returns {{valid: boolean, error?: string}}
   */
  grReference: (value) => {
    if (!value) return { valid: false, error: 'GR reference required' };
    if (!/^GR-\d{4}-\d{4}$/.test(value)) {
      return { valid: false, error: 'GR format must be GR-YYYY-#### (e.g., GR-2026-0042)' };
    }
    return { valid: true };
  },

  /**
   * Validate date with optional bounds
   * @param {string} value - Date string (YYYY-MM-DD)
   * @param {Object} options - Validation options
   * @returns {{valid: boolean, error?: string}}
   */
  date: (value, options = {}) => {
    if (!value) return { valid: false, error: 'Date required' };
    const date = new Date(value + 'T00:00:00');
    if (isNaN(date.getTime())) {
      return { valid: false, error: 'Invalid date format' };
    }
    
    if (options.min && date < new Date(options.min + 'T00:00:00')) {
      return { valid: false, error: `Date cannot be before ${options.min}` };
    }
    
    if (options.max && date > new Date(options.max + 'T00:00:00')) {
      return { valid: false, error: `Date cannot be after ${options.max}` };
    }
    
    return { valid: true };
  },

  /**
   * Validate email format
   * @param {string} value - Email to validate
   * @returns {{valid: boolean, error?: string}}
   */
  email: (value) => {
    if (!value) return { valid: false, error: 'Email required' };
    const emailRegex = /^[^\s@]{1,64}@[^\s@]{1,255}\.[^\s@]{2,}$/;
    if (!emailRegex.test(value)) {
      return { valid: false, error: 'Invalid email address' };
    }
    return { valid: true };
  },

  /**
   * Validate password strength
   * @param {string} value - Password to validate
   * @returns {{valid: boolean, error?: string}}
   */
  password: (value) => {
    if (!value) return { valid: false, error: 'Password required' };
    if (value.length < 8) {
      return { valid: false, error: 'Password must be at least 8 characters' };
    }
    if (!/[A-Z]/.test(value)) {
      return { valid: false, error: 'Password must contain uppercase letter' };
    }
    if (!/[a-z]/.test(value)) {
      return { valid: false, error: 'Password must contain lowercase letter' };
    }
    if (!/[0-9]/.test(value)) {
      return { valid: false, error: 'Password must contain number' };
    }
    return { valid: true };
  },

  /**
   * Validate vendor name
   * @param {string} value - Vendor name to validate
   * @returns {{valid: boolean, error?: string}}
   */
  vendorName: (value) => {
    if (!value) return { valid: false, error: 'Vendor name required' };
    if (value.length < 2) {
      return { valid: false, error: 'Vendor name must be at least 2 characters' };
    }
    if (value.length > 255) {
      return { valid: false, error: 'Vendor name cannot exceed 255 characters' };
    }
    // Prevent XSS attempts
    if (/<|>|script|javascript|onerror|onclick/i.test(value)) {
      return { valid: false, error: 'Vendor name contains invalid characters' };
    }
    return { valid: true };
  }
};

// ===================== API SERVICE LAYER =====================
/** @type {Object} API abstraction layer for all backend calls */
const ApiService = {
  baseURL: '/api',
  authToken: null,
  csrfToken: null,

  /**
   * Set authentication token (from backend)
   * @param {string} token - JWT token
   */
  setAuthToken(token) {
    this.authToken = token;
  },

  /**
   * Get authentication token
   * @returns {string|null}
   */
  getAuthToken() {
    return this.authToken;
  },

  /**
   * Make authenticated API request
   * @param {string} endpoint - API endpoint
   * @param {Object} options - Fetch options
   * @returns {Promise<any>}
   */
  async request(endpoint, options = {}) {
    const url = `${this.baseURL}${endpoint}`;
    
    const headers = {
      'Content-Type': 'application/json',
      ...options.headers
    };

    if (this.authToken) {
      headers['Authorization'] = `Bearer ${this.authToken}`;
    }

    if (this.csrfToken) {
      headers['X-CSRF-Token'] = this.csrfToken;
    }

    try {
      const response = await fetch(url, {
        ...options,
        headers,
        credentials: 'include' // Include cookies for session
      });

      if (response.status === 401) {
        // Token expired or invalid
        AuthService.clearSession();
        UI.showToast('Session expired. Please login again.', 'error');
        location.href = '/';
        return null;
      }

      if (!response.ok) {
        const error = await response.json().catch(() => ({}));
        throw new Error(error.message || `API error: ${response.status}`);
      }

      return await response.json();
    } catch (error) {
      console.error('API request failed:', error);
      throw error;
    }
  },

  // AUTH ENDPOINTS
  auth: {
    login: async (email, password) => {
      return ApiService.request('/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password })
      });
    },

    logout: async () => {
      return ApiService.request('/auth/logout', { method: 'POST' });
    },

    refreshToken: async () => {
      return ApiService.request('/auth/refresh', { method: 'POST' });
    }
  },

  // PURCHASE ORDER ENDPOINTS
  purchaseOrders: {
    list: async (filters = {}) => {
      const params = new URLSearchParams(filters);
      return ApiService.request(`/purchase-orders?${params}`, { method: 'GET' });
    },

    get: async (id) => {
      return ApiService.request(`/purchase-orders/${id}`, { method: 'GET' });
    },

    create: async (data) => {
      return ApiService.request('/purchase-orders', {
        method: 'POST',
        body: JSON.stringify(data)
      });
    },

    update: async (id, data) => {
      return ApiService.request(`/purchase-orders/${id}`, {
        method: 'PATCH',
        body: JSON.stringify(data)
      });
    }
  },

  // INVOICE ENDPOINTS
  invoices: {
    list: async (filters = {}) => {
      const params = new URLSearchParams(filters);
      return ApiService.request(`/invoices?${params}`, { method: 'GET' });
    },

    record: async (data) => {
      return ApiService.request('/invoices', {
        method: 'POST',
        body: JSON.stringify(data)
      });
    },

    approve: async (invoiceId, data = {}) => {
      return ApiService.request(`/invoices/${invoiceId}/approve`, {
        method: 'POST',
        body: JSON.stringify(data)
      });
    },

    markPaid: async (invoiceId, data = {}) => {
      return ApiService.request(`/invoices/${invoiceId}/mark-paid`, {
        method: 'POST',
        body: JSON.stringify(data)
      });
    }
  },

  // GR ENDPOINTS
  goodsReceipts: {
    post: async (data) => {
      return ApiService.request('/goods-receipts', {
        method: 'POST',
        body: JSON.stringify(data)
      });
    }
  },

  // VENDOR ENDPOINTS
  vendors: {
    list: async () => {
      return ApiService.request('/vendors', { method: 'GET' });
    },

    updateEmail: async (vendorId, email) => {
      return ApiService.request(`/vendors/${vendorId}`, {
        method: 'PATCH',
        body: JSON.stringify({ email })
      });
    },

    flag: async (vendorId, reason) => {
      return ApiService.request(`/vendors/${vendorId}/flag`, {
        method: 'POST',
        body: JSON.stringify({ reason })
      });
    }
  },

  // AUDIT LOG ENDPOINTS
  auditLogs: {
    list: async (filters = {}) => {
      const params = new URLSearchParams(filters);
      return ApiService.request(`/audit-logs?${params}`, { method: 'GET' });
    }
  }
};

// ===================== AUTHENTICATION SERVICE =====================
/** @type {Object} Authentication service */
const AuthService = {
  user: null,
  sessionTimeout: null,
  inactivityTimeout: null,
  SESSION_DURATION: 1800000, // 30 minutes
  WARNING_TIME: 300000, // 5 minutes before timeout

  /**
   * Handle login
   * @param {string} email
   * @param {string} password
   * @returns {Promise<boolean>}
   */
  async login(email, password) {
    try {
      const response = await ApiService.auth.login(email, password);
      
      if (response.token && response.user) {
        ApiService.setAuthToken(response.token);
        this.user = response.user;
        this.startSessionManagement();
        return true;
      }
      return false;
    } catch (error) {
      console.error('Login failed:', error);
      throw error;
    }
  },

  /**
   * Handle logout
   * @returns {Promise<void>}
   */
  async logout() {
    try {
      await ApiService.auth.logout();
    } catch (error) {
      console.error('Logout error:', error);
    } finally {
      this.clearSession();
    }
  },

  /**
   * Clear session data
   */
  clearSession() {
    this.user = null;
    ApiService.setAuthToken(null);
    this.stopSessionManagement();
  },

  /**
   * Get current user
   * @returns {Object|null}
   */
  getUser() {
    return this.user;
  },

  /**
   * Check if user has permission
   * @param {string} action
   * @param {Object} resource - Optional resource to check
   * @returns {boolean}
   */
  hasPermission(action, resource = null) {
    if (!this.user) return false;

    const permissions = {
      po_owner: ['create_po', 'update_completion', 'mark_complete'],
      receiver: ['enter_delivery_qty'],
      finance: ['post_gr', 'record_invoice', 'approve_invoice', 'flag_vendor', 'send_alert'],
      senior_finance: ['post_gr', 'record_invoice', 'approve_invoice', 'flag_vendor', 'send_alert', 'approve_high_value']
    };

    if (!permissions[this.user.role]?.includes(action)) {
      return false;
    }

    // Additional business logic checks
    if (action === 'approve_high_value' && resource) {
      return this.user.role === 'senior_finance' && resource.value > 50000;
    }

    if (action === 'post_gr' && resource) {
      // Can't GR own records (conflict of interest)
      return resource.created_by !== this.user.id;
    }

    return true;
  },

  /**
   * Start session timeout management
   */
  startSessionManagement() {
    this.resetSessionTimeout();
    window.addEventListener('mousemove', () => this.resetInactivityTimeout());
    window.addEventListener('keypress', () => this.resetInactivityTimeout());
    window.addEventListener('click', () => this.resetInactivityTimeout());
  },

  /**
   * Stop session timeout management
   */
  stopSessionManagement() {
    clearTimeout(this.sessionTimeout);
    clearTimeout(this.inactivityTimeout);
    window.removeEventListener('mousemove', () => this.resetInactivityTimeout());
    window.removeEventListener('keypress', () => this.resetInactivityTimeout());
    window.removeEventListener('click', () => this.resetInactivityTimeout());
  },

  /**
   * Reset session timeout
   */
  resetSessionTimeout() {
    clearTimeout(this.sessionTimeout);
    
    // Show warning 5 minutes before timeout
    clearTimeout(this.inactivityTimeout);
    this.inactivityTimeout = setTimeout(() => {
      UI.showSessionWarning();
    }, this.SESSION_DURATION - this.WARNING_TIME);

    // Timeout after 30 minutes
    this.sessionTimeout = setTimeout(() => {
      UI.showToast('Your session has expired. Please login again.', 'warning');
      this.logout().then(() => {
        location.href = '/';
      });
    }, this.SESSION_DURATION);
  },

  /**
   * Reset inactivity timeout
   */
  resetInactivityTimeout() {
    this.resetSessionTimeout();
  }
};

/** @type {Object} UI management service */
const UI = {
  currentView: 'dashboard',
  drawerOpen: false,
  modalOpen: false,

  /**

   */
  init() {
    this.setupBanner();
    this.setupSidebar();
    this.currentView = AuthService.user?.role === 'receiver' ? 'deliveries' : 'dashboard';
    this.render();
  },

  /**
   * Setup banner with user information
   */
  setupBanner() {
    const user = AuthService.getUser();
    if (!user) return;

    const roleColors = {
      po_owner: 'bg-emerald-50 text-emerald-800 border-emerald-200',
      receiver: 'bg-gray-100 text-gray-700 border-gray-200',
      finance: 'bg-blue-50 text-blue-800 border-blue-200',

    const banner = document.getElementById('roleBanner');
    banner.className = `h-11 flex items-center justify-between px-4 text-xs font-600 border-b ${roleColors[user.role] || ''}`;

    const bannerText = document.getElementById('bannerText');
    const textElement = document.createElement('span');
    textElement.textContent = `Signed in as ${user.name} · ${ROLE_LABELS[user.role]}`;
    bannerText.replaceChildren(textElement);
  },

  /**
   * Setup sidebar navigation
   */
  setupSidebar() {
    const user = AuthService.getUser();
    const sidebarNav = document.getElementById('sidebarNav');
    
    let items = [];

    if (user.role === 'receiver') {
      items = [
        { id: 'deliveries', icon: 'fa-truck', label: 'Deliveries Awaiting Count' }

      ];

      }

      if (AuthService.hasPermission('record_invoice')) {

      }

      items.push(
        { id: 'forecast', icon: 'fa-chart-line', label: 'Expense Forecast' },
        { id: 'vendors', icon: 'fa-building', label: 'Vendors' },
        { id: 'reconciliation', icon: 'fa-arrows-rotate', label: 'ERP Reconciliation' },
        { id: 'settings', icon: 'fa-gear', label: 'Settings' }
      );

    sidebarNav.innerHTML = '';
    items.forEach(item => {
      const button = document.createElement('button');
      button.className = `w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition relative ${
        this.currentView === item.id

      }`;
      button.onclick = () => this.navigate(item.id);

      const icon = document.createElement('i');
      icon.className = `fas ${item.icon} w-5 text-center`;

      const label = document.createElement('span');
      label.textContent = item.label;

      button.appendChild(icon);
      button.appendChild(label);
      sidebarNav.appendChild(button);
    });
  },

  /**
   * Navigate to view
   * @param {string} view
   */
  navigate(view) {
    this.currentView = view;
    this.setupSidebar();
    this.render();
    if (window.innerWidth < 768) {
      this.toggleSidebar();
    }
  },

  /**
   * Toggle sidebar on mobile
   */
  toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
  },

  /**
   * Main render function
   */
  render() {
    const renderMap = {
      dashboard: renderDashboard,
      commitments: renderCommitments,
      grqueue: renderGrQueue,
      invoicecontrol: renderInvoiceControl,
      forecast: renderForecast,
      vendors: renderVendors,
      reconciliation: renderReconciliation,
      deliveries: renderDeliveries,
      settings: renderSettings
    };

    const renderer = renderMap[this.currentView] || renderDashboard;
    try {
      renderer();
    } catch (error) {
      console.error('Render error:', error);

  },

  /**
   * Open modal
   * @param {HTMLElement} content
   */
  openModal(content) {
    const modalBox = document.getElementById('modalBox');
    if (typeof content === 'string') {
      modalBox.textContent = content;
    } else {
      modalBox.replaceChildren(content);
    }
    document.getElementById('modalOverlay').classList.add('open');
    this.modalOpen = true;
  },

  /**
   * Close modal
   */
  closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    this.modalOpen = false;
  },

  /**
   * Show toast notification
   * @param {string} message
   * @param {string} type - 'success', 'error', 'warning', 'info'
   */
  showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    
    const colors = {
      success: 'bg-green-500',
      error: 'bg-red-500',
      warning: 'bg-amber-500',
      info: 'bg-blue-500'
    };

    toast.className = `toast ${colors[type] || colors.info} text-white px-4 py-3 rounded-lg text-sm font-600`;
    toast.textContent = message;
    
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  },

  /**
   * Show session warning
   */
  showSessionWarning() {
    const warningBtn = document.getElementById('sessionWarningBtn');
    warningBtn.classList.remove('hidden');
    this.showToast('Your session will expire in 5 minutes. Click to extend.', 'warning');
  },

  /**
   * Format currency for display
   * @param {number} value
   * @returns {string}
   */
  formatCurrency(value) {
    if (value === null || value === undefined) return '—';
    return 'R ' + Number(value).toLocaleString('en-ZA', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  },

  /**
   * Format date for display
   * @param {string} dateStr
   * @returns {string}
   */
  formatDate(dateStr) {
    if (!dateStr) return '—';
    const date = new Date(dateStr + 'T00:00:00');
    return date.toLocaleDateString('en-ZA', { day: '2-digit', month: 'short', year: 'numeric' });
  }
};

// ===================== EVENT HANDLERS =====================

/**
 * Handle login button click
 */
async function handleLogin() {
  const loginBtn = document.getElementById('loginBtn');
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  // Clear previous errors
  document.getElementById('loginEmailError').textContent = '';
  document.getElementById('loginPasswordError').textContent = '';
  document.getElementById('loginError').textContent = '';

  // Validate inputs
  const emailVal = Validators.email(email);
  if (!emailVal.valid) {
    document.getElementById('loginEmailError').textContent = emailVal.error;
    return;
  }

  const passwordVal = Validators.password(password);
  if (!passwordVal.valid) {
    document.getElementById('loginPasswordError').textContent = passwordVal.error;
    return;
  }

  loginBtn.disabled = true;
  loginBtn.classList.add('loading');

  try {
    await AuthService.login(email, password);
    
    // Show app, hide login
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    
    // Initialize UI
    UI.init();
  } catch (error) {
    const errorMsg = document.getElementById('loginError');
    errorMsg.textContent = error.message || 'Login failed. Please try again.';
    errorMsg.classList.remove('hidden');
  } finally {
    loginBtn.disabled = false;
    loginBtn.classList.remove('loading');
  }
}

/**
 * Handle logout
 */
async function handleLogout() {
  if (confirm('Are you sure you want to logout?')) {
    await AuthService.logout();
    document.getElementById('app').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPassword').value = '';
  }
}

  if (document.hidden && AuthService.user) {

    AuthService.stopSessionManagement();
  } else if (!document.hidden && AuthService.user) {
    // Page visible - resume session timer
    AuthService.startSessionManagement();
  }
});

// Global error handler

  console.error('Uncaught error:', event.error);
  UI.showToast('An unexpected error occurred. Please refresh the page.', 'error');
});

// Prevent accidental data loss

  if (UI.modalOpen || UI.drawerOpen) {
    event.preventDefault();
    event.returnValue = '';
  }
});
